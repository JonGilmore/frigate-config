version: 0.17-0
detectors:
  ov_0:
    type: openvino
    device: GPU
  ov_1:
    type: openvino
    device: GPU

tls:
  enabled: false

logger:
  default: info

model:
  path: plus://cc26ebf8f5c3259a6a78dbcc667a2633 # yolov9s - 320

database:
  path: /config/frigate.db

mqtt:
  host: mosquitto
  topic_prefix: frigate
  user: frigate
  password: '{FRIGATE_MQTT_PASSWORD}'

face_recognition:
  enabled: true
  model_size: large

lpr:
  enabled: true
  debug_save_plates: false
  known_plates:
    lauras-car:
      - 2JL-897
    jons-car:
      - ZYG-247

classification:
  bird:
    enabled: false

  custom:
    double-garage-status:
      enabled: true
      name: double-garage-status
      threshold: 0.8
      state_config:
        cameras:
          garage:
            crop:
              - 0.6282777464098555
              - 0.0479859690487141
              - 0.9852494480129776
              - 0.6826023274542649
        motion: true
    single-garage-status:
      enabled: true
      name: single-garage-status
      threshold: 0.8
      state_config:
        cameras:
          garage:
            crop:
              - 0.4530187052434486
              - 0
              - 0.5855954473903431
              - 0.23569198603892355
        motion: true
    trash-out:
      enabled: true
      name: trash-out
      threshold: 0.8
      state_config:
        cameras:
          driveway:
            crop:
              - 0.10079300635621785
              - 0.13360300638059583
              - 0.2305608674970691
              - 0.3643014261865536
        motion: true
    daisy:
      enabled: true
      name: daisy
      threshold: 0.8
      object_config:
        objects:
          - dog
        classification_type: sub_label
    trash:
      enabled: true
      name: trash
      threshold: 0.8
      object_config:
        objects:
          - waste_bin
        classification_type: attribute
record:
  enabled: true
  alerts:
    retain:
      days: 80
      mode: motion
    pre_capture: 6
  detections:
    retain:
      days: 80
      mode: motion
    pre_capture: 6

  continuous:
    days: 9
  motion:
    days: 9
timestamp_style:
  position: tr
  effect: solid

snapshots:
  enabled: true
  timestamp: false
  crop: true
  retain:
    default: 30
    objects:
      person: 30

ffmpeg:
  hwaccel_args: preset-nvidia # for use with p620 gpu
  apple_compatibility: true
  output_args:
    record: preset-record-generic-audio-aac

detect:
  enabled: true
  fps: 7
  width: 1920
  height: 1080

objects:
  track:
    - person
    - face
    - dog
    - cat
    - deer
    - raccoon
    - fox
    - bear
    - squirrel
    - rabbit

go2rtc:
  streams:
    doorbell:
      - rtsp://admin:{FRIGATE_RTSP_PASSWORD}@192.168.30.21:554/h264Preview_01_main
      - ffmpeg:doorbell#audio=opus
    doorbell_sub:
      #- ffmpeg:rtsp://admin:{FRIGATE_RTSP_PASSWORD}@192.168.30.21:554/h264Preview_01_main#video=h264#encoder=h264_nvenc#width=1280#height=720#bitrate=2500k#fps=7#preset=llhq#hardware
