      #- ffmpeg:rtsp://{FRIGATE_RTSP_USER}:{FRIGATE_RTSP_PASSWORD}@192.168.50.2:554/cam/realmonitor?channel=1&subtype=0#audio=aac#video=h264#encoder=h264_nvenc#width=1280#height=720#bitrate=2500k#fps=15#preset=llhq#hardware # example from: https://www.reddit.com/r/frigate_nvr/comments/1mazjyl/frigate_not_using_nvidia_for_encode_decode_of/
